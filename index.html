<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-tac-toe project</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div class="game-container">
        <div class="cell0"></div>
        <div class="cell1"></div>
        <div class="cell2"></div>
        <div class="cell3"></div>
        <div class="cell4"></div>
        <div class="cell5"></div>
        <div class="cell6"></div>
        <div class="cell7"></div>
        <div class="cell8"></div>
    </div>

    <button class="new-game">New game</button>
    <dialog class="pop-up-form">
        <form class="playersContainer">
            <label for="playerOne">P1 nickname:</label>
            <input type="text" name="p1-nickname" id="p1-nickname" required>
            <label for="playerTwo">P2 nickname</label>
            <input type="text" name="p2-nickname" id="p2-nickname" required>

            <div class="markChoice">
                <button type="button">X</button>
                <p>or</p>
                <button type="button">O</button>
            </div>

            <button type="submit">Submit</button>
        </form>

    </dialog>

</body>

</html>
