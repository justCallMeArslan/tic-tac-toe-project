<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe project</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div class="main-container">
        <div class="player-one-container">
            <p class="player-one-nickname">P1 (nickname)</p>
            <p class="player-one-score">Rounds won:</p>
        </div>
        <div class="game-container">
            <div class="cell0"></div>
            <div class="cell1"></div>
            <div class="cell2"></div>
            <div class="cell3"></div>
            <div class="cell4"></div>
            <div class="cell5"></div>
            <div class="cell6"></div>
            <div class="cell7"></div>
            <div class="cell8"></div>
        </div>
        <div class="player-two-container">
            <p class="player-one-nickname">P2 ($nickname)</p>
            <p class="player-one-score"> Rounds won: </p>
        </div>
    </div>

    <div class="controls">
        <button class="new-game-btn">New game</button>
        <dialog class="form-pop-up">
            <form class="playersContainer">
                <label for="player-one">Player #1 nickname:</label>
                <input type="text" name="p1-nickname" id="p1-nickname" required>
                <label for="player-two">Player #2 nickname:</label>
                <input type="text" name="p2-nickname" id="p2-nickname" required>
                <p>Player #1 choose your mark:</p>
                <div class="mark-choice">
                    <button type="button">X</button>
                    <p>or</p>
                    <button type="button">O</button>
                </div>
                <button type="submit" class="close-modal">Submit</button>
            </form>
        </dialog>
        <button type="button">Reset game</button>
    </div>

</body>

</html>
