<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-tac-toe project</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div class="game-container">
        <div class="cell0"></div>
        <div class="cell1"></div>
        <div class="cell2"></div>
        <div class="cell3"></div>
        <div class="cell4"></div>
        <div class="cell5"></div>
        <div class="cell6"></div>
        <div class="cell7"></div>
        <div class="cell8"></div>
    </div>

    <button class="new-game">New game</button>
    <dialog class="pop-up-form">
        <form class="playersContainer">
            input nickname for p1
            input nickname for p2

            2 choose for X or O

            <button type="submit">Submit</button>
        </form>

    </dialog>

</body>

</html>
